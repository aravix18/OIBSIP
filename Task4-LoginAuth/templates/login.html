<html>
<head>
    <title>Cinema Club Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 50px 20px; }
        .login-box { max-width: 350px; margin: 0 auto; background: white; padding: 25px; border: 1px solid #cccccc; border-radius: 5px; text-align: center; }
        h2 { color: #b22222; margin-bottom: 20px; font-size: 1.4rem; }
        input[type="email"], input[type="password"], input[type="text"] { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #999999; border-radius: 4px; box-sizing: border-box; }
        .show-pass-container { text-align: left; margin-bottom: 15px; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; margin-top: -5px; }
        button { width: 100%; padding: 10px; background-color: #b22222; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
        button:hover { background-color: #8b0000; }
        p { margin-top: 15px; font-size: 0.9rem; }
        a { color: #b22222; text-decoration: none; }
        .error-link { display: block; margin-bottom: 15px; padding: 8px; background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; border-radius: 4px; font-size: 0.85rem; }
        .error-link a { font-weight: bold; text-decoration: underline; color: #721c24; }
        .success-banner { display: block; margin-bottom: 15px; padding: 10px; background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; border-radius: 4px; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Cinema Club Login</h2>
        
        {% if msg == 'success' %}
        <div class="success-banner">Account created successfully! Please sign in below.</div>
        {% endif %}

        {% if failed %}
        <span class="error-link">
            Don't have an account? <a href="/register">Create a new one by clicking here</a>.
        </span>
        {% endif %}

        <form action="/login" method="POST">
            <input type="email" name="email" placeholder="Email (username@gmail.com)" required>
            <input type="password" id="login-pass" name="password" placeholder="Password" required>
            
            <div class="show-pass-container">
                <input type="checkbox" id="toggle-login-pass" onclick="togglePassVisibility()">
                <label for="toggle-login-pass">Show Password</label>
            </div>

            <button type="submit">Sign In</button>
        </form>
        <p>New member? <a href="/register">Create an account</a></p>
    </div>

    <script>
        function togglePassVisibility() {
            var box = document.getElementById("login-pass");
            if (box.type === "password") {
                box.type = "text";
            } else {
                box.type = "password";
            }
        }
    </script>
</body>
</html>
